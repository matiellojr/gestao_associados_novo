# Copie o conteúdo deste arquivo para o gerenciador de Secrets do Streamlit Cloud
# (ou renomeie para secrets.toml apenas no ambiente local, não faça commit de credenciais reais).

[general]
email = "teste@email.com. br"

[db]
# Dados da conexão PostgreSQL usados por db.get_connection()
# Equivalentes às variáveis DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD.
host = "seu-host-postgres"
port = "5432"
name = "gestao_associado_novo"
user = "postgres"
password = "senha"

[auth]
# Chave segura para assinar cookies de sessão (>=32 caracteres aleatórios)
GESTAO_SECRET_KEY = "coloque-uma-chave-forte-aqui"
DEV_USER_PASSWORD = "senha-opcional-para-usuario-developer"

[smtp]
SMTP_HOST = "smtp.exemplo.com"
SMTP_PORT = "587"
SMTP_USER = "no-reply@exemplo.com"
SMTP_PASSWORD = "senha-smtp"
EMAIL_FROM = "no-reply@exemplo.com"
